<!DOCTYPE html>
<html lang="en" data-theme="cyber-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Of Tanvir</title>
    <!-- FontAwesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* ৫টি প্রিমিয়াম থিম কালার */
        :root { --bg: #030108; --panel: rgba(12, 8, 24, 0.85); --text: #ffffff; --primary: #00f0ff; --secondary: #ff0055; --glow: rgba(0, 240, 255, 0.4); }
        [data-theme="neon-purple"] { --bg: #0b0114; --panel: rgba(23, 4, 38, 0.85); --text: #ffffff; --primary: #bd00ff; --secondary: #00ffcc; --glow: rgba(189, 0, 255, 0.4); }
        [data-theme="toxic-green"] { --bg: #020804; --panel: rgba(4, 24, 9, 0.85); --text: #ffffff; --primary: #39ff14; --secondary: #ffaa00; --glow: rgba(57, 255, 20, 0.4); }
        [data-theme="blood-red"] { --bg: #0a0101; --panel: rgba(26, 4, 4, 0.85); --text: #ffffff; --primary: #ff0000; --secondary: #ffffff; --glow: rgba(255, 0, 0, 0.5); }
        [data-theme="matrix-light"] { --bg: #f4f7f6; --panel: rgba(255, 255, 255, 0.95); --text: #05140b; --primary: #00aa44; --secondary: #031408; --glow: rgba(0, 170, 68, 0.2); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 50px; }
        
        /* হেডার */
        header { background: var(--panel); backdrop-filter: blur(20px); border-bottom: 2px solid var(--primary); padding: 20px 6%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .brand-logo { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900; letter-spacing: 4px; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .mode-select { background: rgba(0, 0, 0, 0.6); border: 2px solid var(--primary); color: #fff; padding: 6px 12px; border-radius: 6px; font-family: 'Orbitron', sans-serif; font-size: 12px; cursor: pointer; outline: none; }
        
        /* মেইন কন্টেইনার */
        .wrapper { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 30px; }
        
        /* প্রোফাইল কার্ড */
        .hero { background: var(--panel); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 50px 40px; text-align: center; box-shadow: var(--glow) 0px 0px 40px -10px; }
        .avatar { width: 140px; height: 140px; margin: 0 auto 20px; border-radius: 50%; border: 4px solid var(--primary); box-shadow: 0 0 30px var(--primary); overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 42px; letter-spacing: 2px; margin-bottom: 10px; }
        p.tagline { opacity: 0.7; font-size: 18px; margin-bottom: 30px; letter-spacing: 1px; }
        
        /* সোশ্যাল গ্রিড */
        .social-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: inherit; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 0 20px var(--glow); border-color: var(--primary); }
        .card i { font-size: 30px; }
        .tg:hover i { color: #26a5e4; } .yt:hover i { color: #ff0000; } .tt:hover i { color: #00f0ff; } .fb:hover i { color: #1877f2; }

        /* লাইভ চ্যাট প্যানেল */
        .chat-panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 25px; box-shadow: var(--glow) 0px 0px 30px -10px; display: flex; flex-direction: column; height: 450px; }
        .chat-header { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900; color: var(--primary); margin-bottom: 15px; border-left: 4px solid var(--secondary); padding-left: 10px; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.02); }
        .message { background: rgba(255,255,255,0.04); padding: 8px 12px; border-radius: 8px; width: fit-content; max-width: 85%; font-size: 16px; word-break: break-word; }
        .message .user { color: var(--primary); font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: bold; margin-bottom: 2px; display: block; }
        .chat-input { display: flex; gap: 10px; }
        .chat-input input { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid var(--primary); padding: 12px; border-radius: 8px; color: #fff; font-size: 15px; outline: none; }
        .chat-input button { background: var(--primary); color: #000; border: none; padding: 0 25px; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 768px) {
            h1 { font-size: 30px; }
        }
    </style>

    <!-- Firebase Core SDK Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <header>
        <div class="brand-logo">TANVIR.X</div>
        <select class="mode-select" id="modeSelector">
            <option value="cyber-dark">🩵 CYBER DARK</option>
            <option value="neon-purple">💜 NEON PURPLE</option>
            <option value="toxic-green">💚 TOXIC GREEN</option>
            <option value="blood-red">❤️ BLOOD RED</option>
            <option value="matrix-light">🤍 MATRIX LIGHT</option>
        </select>
    </header>

    <div class="wrapper">
        <!-- প্রোফাইল হিরো কার্ড -->
        <div class="hero">
            <div class="avatar"><img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=TanvirGodMode" alt="Avatar"></div>
            <h1>GAMER OF TANVIR</h1>
            <p class="tagline">🔥 PRO GAMER & APPLICATION DEVELOPER 🔥</p>

            <div class="social-grid">
                <a href="https://t.me/likebot100like" target="_blank" class="card tg"><div style="display:flex;align-items:center;gap:12px"><i class="fab fa-telegram-plane"></i><div style="text-align:left;"><h3>Telegram</h3></div></div><i class="fas fa-link"></i></a>
                <a href="https://www.youtube.com/@Sketchware-Master" target="_blank" class="card yt"><div style="display:flex;align-items:center;gap:12px"><i class="fab fa-youtube"></i><div style="text-align:left;"><h3>YouTube</h3></div></div><i class="fas fa-link"></i></a>
                <a href="https://www.tiktok.com/@tanvir2vai?_r=1&_t=ZS-97MwHNoOohZ" target="_blank" class="card tt"><div style="display:flex;align-items:center;gap:12px"><i class="fab fa-tiktok"></i><div style="text-align:left;"><h3>TikTok</h3></div></div><i class="fas fa-link"></i></a>
                <a href="https://www.facebook.com/share/1KsfTCqCQ4/" target="_blank" class="card fb"><div style="display:flex;align-items:center;gap:12px"><i class="fab fa-facebook-f"></i><div style="text-align:left;"><h3>Facebook</h3></div></div><i class="fas fa-link"></i></a>
            </div>
        </div>

        <!-- গ্লোবাল লাইভ চ্যাট প্যানেল -->
        <div class="chat-panel">
            <div class="chat-header">
                <span><i class="main-icon fas fa-comments" style="margin-right: 8px;"></i> SQUAD LIVE CHAT</span>
                <span style="font-size: 11px; opacity: 0.6; font-family:'sans-serif';">Online Sync</span>
            </div>
            <div class="chat-messages" id="chatContainer">
                <div class="message"><span class="user">SYSTEM</span>স্বাগতম ভাই! আপনার নাম সেট করে সবার সাথে লাইভ আড্ডা দিন।</div>
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="এখানে আপনার মেসেজ লিখুন...">
                <button id="sendButton">SEND</button>
            </div>
        </div>
    </div>

    <script>
        // --- থিম চেঞ্জার কোড (Fixed Typo) ---
        const modeSelector = document.getElementById('modeSelector');
        const savedMode = localStorage.getItem('tanvir-theme') || 'cyber-dark';
        document.documentElement.setAttribute('data-theme', savedMode);
        modeSelector.value = savedMode;

        modeSelector.addEventListener('change', (e) => {
            document.documentElement.setAttribute('data-theme', e.target.value); // Fixed 'vaue' to 'value'
            localStorage.setItem('tanvir-theme', e.target.value);
        });

        // --- ফায়ারবেস কনফিগারেশন ---
        const firebaseConfig = {
            apiKey: "AIzaSyAtcqfk2EwwCwEyGWwwOpAR7aJJZGXDADc",
            authDomain: "admin-panel-e5d4e.firebaseapp.com",
            databaseURL: "https://admin-panel-e5d4e-default-rtdb.firebaseio.com",
            projectId: "admin-panel-e5d4e",
            storageBucket: "admin-panel-e5d4e.firebasestorage.app",
            messagingSenderId: "1040742002505",
            appId: "1:1040742002505:web:a9046d2fa5155a17c47498",
            measurementId: "G-B5JJ8VJEF0"
        };

        // ফায়ারবেস ইনিশিয়েলাইজেশন (Fixed Condition Block)
        let chatRef = null;
        try {
            firebase.initializeApp(firebaseConfig);
            chatRef = firebase.database().ref("squad_chats");
        } catch(e) { 
            console.log("Firebase Connection Error: ", e); 
        }

        // নিকনেম সেটআপ
        let nickname = localStorage.getItem('user-nickname');
        if(!nickname) {
            nickname = prompt("চ্যাটে কথা বলার জন্য আপনার একটি নাম দিন:") || "Gamer_" + Math.floor(Math.random()*1000);
            localStorage.setItem('user-nickname', nickname);
        }

        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        const chatContainer = document.getElementById('chatContainer');

        sendButton.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        function sendMessage() {
            const text = chatInput.value.trim();
            if(text !== "") {
                if(chatRef) {
                    chatRef.push().set({ name: nickname, msg: text });
                } else {
                    showMsg(nickname, text);
                }
                chatInput.value = "";
            }
        }

        function showMsg(user, text) {
            const html = `<div class="message"><span class="user">${user}</span>${text}</div>`;
            chatContainer.innerHTML += html;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // ফায়ারবেস লাইভ রিয়েল-টাইম লিসেনার
        if(chatRef) {
            chatRef.limitToLast(30).on('child_added', (snapshot) => {
                const data = snapshot.val();
                showMsg(data.name, data.msg);
            });
        }
    </script>
</body>
</html>
